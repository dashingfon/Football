<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> Fotclan </title>

    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href=".//assets/output.css" />
    <link rel="shortcut icon" href=".//assets/favicon.ico" type="image/x-icon" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter&display=swap"
        rel="stylesheet" />

    <script src=".//assets/js/components.js" type="module" defer></script>
    <script src=".//assets/js/iconify.min.js"></script>

    <init-stats>
    </init-stats>

    
    
    <style>
    .skeleton {
        background: var(--color-bg-1);
        border-radius: 4px;
        animation: pulse 1.5s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }

        50% {
          opacity: 0.4;
        }

        100% {
          opacity: 1;
        }
      }

      @keyframes fade-up {
        0% {
          opacity: 0;
          transform: translateY(40px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fadeUp {
        opacity: 0;
        animation: fade-up 0.8s forwards;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: #e5e7eb;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #3b82f6;
        border-radius: 9999px;
      }
    </style>
</head>

<body
    data-theme="light"
    class="font-[Inter] antialiased text-text-1 bg-bg-1 transition-colors duration-500 flex h-screen whitespace-nowrap group/body"
>
    
    <aside class="hidden md:block left-0 top-0 z-10 h-screen fixed border-r border-bg-3" aria-label="Sidebar">
        <div class="h-full px-3 py-4 overflow-y-auto no-scrollbar bg-bg-1 flex flex-col justify-between transition-all duration-50 group hover:w-70 data-[expanded=false]:w-16"
            data-active="">
            <div>

                </ul>

                    </li>
                    <li>

                            <span
                                class="text-sm ms-3 hidden group-data-[active=league]:text-brand group-hover:block">Leagues</span>
                        </a>
                    </li>
                    <li>
                        <a href=".//news.html"

                            <span
