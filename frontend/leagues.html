<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(40px)
            }

            100% {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fadeUp {
            opacity: 0;
            animation: fade-up 0.8s forwards
        }
    </style>

    <title>Fotclan - Leagues</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="./assets/output.css">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter&display=swap"
        rel="stylesheet">

    <script src="./assets/js/components.js" type="module" defer></script>
    <script src="./assets/js/iconify.min.js"></script>

</head>

<body data-theme="light"
    class="font-[Inter] antialiased text-text-1 transition-colors duration-500 bg-bg-2 flex h-screen whitespace-nowrap group/body">

    <aside class="hidden md:block z-40 h-screen relative border-r border-bg-3" aria-label="Sidebar">
        <div class="h-full px-3 py-4 overflow-y-auto no-scrollbar bg-bg-1 flex flex-col justify-between transition-all duration-50 group hover:w-70 data-[expanded=false]:w-16"
            data-active="league">
            <div>
                <ul class="space-y-2 font-medium pb-3">
                    <li>
                        <a href="./index.html" class="relative flex items-center p-2 text-text-1 rounded-lg">
                            <img src="./assets/favicon.ico" class="w-6 h-6" />
                            <span class="text-md ms-3 hidden group-hover:block">Fotclan</span>
                        </a>
                    </li>
                </ul>
                <ul class="space-y-2 font-medium border-t border-bg-3 pt-3">
                    <li>
                        <a href="./matches.html"
                            class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="boxicons:football-pitch" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=matches]:text-brand"></iconify-icon>

                            <span
                                class="text-sm ms-3 hidden group-data-[active=matches]:text-brand group-hover:block">Matches</span>
                        </a>
                    </li>
                    <li>
                        <a href="./leagues.html"
                            class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="ix:trophy" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=league]:text-brand text-text-6">
                            </iconify-icon>
                            <span
                                class="text-sm ms-3 hidden group-data-[active=league]:text-brand group-hover:block">Leagues</span>
                        </a>
                    </li>
                    <li>
                        <a href="./news.html" class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="streamline-plump:news-paper" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=news]:text-brand text-text-6">
                            </iconify-icon>
                            <span
                                class="text-sm ms-3 hidden group-data-[active=news]:text-brand group-hover:block">News</span>
                        </a>
                    </li>
                    <li>
                        <a href="./profile.html"
                            class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="healthicons:ui-user-profile" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=profile]:text-brand text-text-6">
                            </iconify-icon>
                            <span
                                class="text-sm ms-3 hidden group-data-[active=profile]:text-brand group-hover:block">Profile</span>
                        </a>
                    </li>
                </ul>
            </div>

            <mode-toggle-button>
                <button class="p-1 hover:bg-bg-3 text-text-2 rounded-md border border-bg-3" mode-toggle>
                    <iconify-icon icon="meteocons:starry-night-fill" width="100%" height="100%"
                        class="w-8 h-8 group-data-[theme=dark]/body:hidden group-data-[theme=light]/body:block"></iconify-icon>

                    <iconify-icon icon="meteocons:clear-day-fill" width="100%" height="100%"
                        class="w-8 h-8 group-data-[theme=dark]/body:block group-data-[theme=light]/body:hidden"></iconify-icon>
                </button>
            </mode-toggle-button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 h-screen bg-bg-2">

        <div class="@container max-w-5xl mx-auto">

            <!-- Nav -->
            <section class="mb-6 fadeUp flex justify-between">
                <div class="relative flex items-center">
                    <span>Leagues</span>
                </div>
                <mode-toggle-button>
                    <button class="p-1 bg-bg-3 hover:bg-bg-1 text-text-2 rounded-md border border-bg-1" mode-toggle>
                        <iconify-icon icon="meteocons:starry-night-fill" width="100%" height="100%"
                            class="w-8 h-8 group-data-[theme=dark]/body:hidden group-data-[theme=light]/body:block"></iconify-icon>

                        <iconify-icon icon="meteocons:clear-day-fill" width="100%" height="100%"
                            class="w-8 h-8 group-data-[theme=dark]/body:block group-data-[theme=light]/body:hidden"></iconify-icon>
                    </button>
                </mode-toggle-button>
            </section>

            <!-- Search -->
            <section class="mb-10 fadeUp">
                <search-filter>
                    <div class="relative flex items-center mt-4 md:mt-0">
                        <span class="absolute text-text-4 mx-3">
                            <iconify-icon width="24" height="24" icon="jam:search" class="w-5 h-5 text-text-4">
                            </iconify-icon>
                        </span>

                        <input type="text" list="browsers" placeholder="Find Leagues"
                            class="text-sm block w-full py-2.5 pr-5 text-text-4 bg-bg-3 border border-bg-1 rounded-xl placeholder-text-6 pl-11 rtl:pr-11 rtl:pl-5  focus:outline-none focus:ring-2 focus:ring-brand/50 focus:border-brand transition-all"
                            name="search">

                    </div>
                </search-filter>
            </section>

            <!-- Leagues -->
            <section class="mb-2 fadeUp dark:glass-light rounded-md fadeUp">
                <div class="relative flex flex-col items-center gap-4 overflow-x-auto w-full" id="leagues">

                    <a class="flex p-4 items-center w-full bg-bg-1 rounded-md shadow-md shadow-bg-1 hover:bg-bg-1"
                        href="./leagues/champions_league">
                        <img src="./assets/uefa-champions-league.svg" class="w-10 h-10 text-text-1">

                        </img>
                        <p class="px-4 text-md font-medium whitespace-nowrap">
                            Champions League
                        </p>
                    </a>

                    <a class="flex p-4 items-center w-full bg-bg-1 rounded-md shadow-md shadow-bg-1 hover:bg-bg-1"
                        href="./leagues/football_spot">
                        <img src="./assets/mercedes-benz.svg" class="w-10 h-10">

                        </img>
                        <p class="px-4 text-md font-medium whitespace-nowrap">
                            Football Spot
                        </p>
                    </a>

                    <a class="flex p-4 items-center w-full bg-bg-1 rounded-md shadow-md shadow-bg-1 hover:bg-bg-1"
                        href="./leagues/football_spot">
                        <img src="./assets/favicon.ico" class="w-10 h-10">

                        </img>
                        <p class="px-4 text-md font-medium whitespace-nowrap">
                            Fotclan League
                        </p>
                    </a>
                </div>

            </section>

            <!-- <div class="h-12 md:h-0 lg:h-0"></div> -->
        </div>


    </main>

    <!-- Bottom Navigation (Mobile) -->

    <nav id="mobile-nav" data-hidden="false"
        class="md:hidden fixed bottom-0 inset-x-0 glass dark:glass-light backdrop-blur-md border-t border-bg-3 bg-bg-2 flex justify-around pb-3 text-text-2 group data-[hidden=true]:translate-y-full transition-transform duration-300"
        data-active="league">
        <a href="./matches.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="true">
            <iconify-icon icon="boxicons:football-pitch" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=matches]:text-brand text-text-6"></iconify-icon>
            <span
                class="group-data-[active=matches]:text-brand text-text-6">Matches</span>
        </a>
        <a href="./leagues.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="false">
            <iconify-icon icon="ix:trophy" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=league]:text-brand text-text-6">
            </iconify-icon>
            <span
                class="group-data-[active=league]:text-brand text-text-6">Leagues</span>
        </a>
        <a href="./news.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="false">
            <iconify-icon icon="streamline-plump:news-paper" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=news]:text-brand text-text-6">
            </iconify-icon>
            <span
                class="group-data-[active=news]:text-brand text-text-6">News</span>
        </a>
        <a href="./profile.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="false">
            <iconify-icon icon="healthicons:ui-user-profile" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=profile]:text-brand text-text-6">
            </iconify-icon>
            <span
                class="group-data-[active=profile]:text-brand text-text-6">Profile</span>
        </a>
    </nav>

</body>
<script>
    /* ---------- ANIMATE CARDS ---------- */
    document.querySelectorAll('.fadeUp').forEach((el, i) => {
        setTimeout(() => el.style.opacity = 1, 300 + i * 80);
    });

    /* ---------- SCROLL NAV HIDE/SHOW ---------- */
    let lastTogglePos = 0;
    const nav = document.getElementById("mobile-nav");
    const mainElement = document.querySelector('main');
    const scrollThreshold = 20;

    if (mainElement && nav) {
        mainElement.addEventListener('scroll', () => {
            const currentScrollPos = mainElement.scrollTop;
            const scrollDelta = Math.abs(currentScrollPos - lastTogglePos);

            if (scrollDelta >= scrollThreshold) {
                if (currentScrollPos > lastTogglePos) {
                    // Scrolling down - hide nav
                    nav.setAttribute('data-hidden', 'true');
                } else {
                    // Scrolling up - show nav
                    nav.setAttribute('data-hidden', 'false');
                }
                lastTogglePos = currentScrollPos;
            }
        });
    }
</script>

</html>
