<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(40px)
            }

            100% {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fadeUp {
            opacity: 0;
            animation: fade-up 0.8s forwards
        }
    </style>

    <title>Fotclan - Leagues</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="./assets/output.css">
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter&display=swap"
        rel="stylesheet">

    <script src="./assets/js/components.js" type="module" defer></script>
    <script src="./assets/js/iconify.min.js"></script>

</head>

<body data-theme="light"
    class="font-[Inter] antialiased text-gray-800 transition-colors duration-500 dark:bg-gray-50 dark:text-white flex h-screen whitespace-nowrap group/body">

    <aside class="hidden md:block z-40 h-screen relative border-r border-gray-200 dark:border-gray-700"
        aria-label="Sidebar">
        <div class="h-full px-3 py-4 overflow-y-auto no-scrollbar bg-gray-50 dark:bg-gray-900 flex flex-col justify-between transition-all duration-50 group hover:w-70 data-[expanded=false]:w-16"
            data-active="league">
            <div>
                <ul class="space-y-2 font-medium pb-3">
                    <li>
                        <a href="./index.html"
                            class="relative flex items-center p-2 text-gray-900 rounded-lg dark:text-white">
                            <img src="./assets/favicon.ico" class="w-6 h-6" />
                            <span class="text-md ms-3 hidden group-hover:block">Fotclan</span>
                        </a>
                    </li>
                </ul>
                <ul class="space-y-2 font-medium border-t border-gray-200 dark:border-gray-700 pt-3">
                    <li>
                        <a href="./matches.html"
                            class="relative flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 z-200">
                            <iconify-icon icon="boxicons:football-pitch" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=matches]:text-white group-data-[active=matches]:dark:text-black text-gray-500 "></iconify-icon>

                            <span
                                class="text-sm ms-3 hidden group-data-[active=matches]:text-black group-data-[active=matches]:dark:text-white text-gray-500 group-hover:block">Matches</span>
                        </a>
                    </li>
                    <li>
                        <a href="./leagues.html"
                            class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                            <iconify-icon icon="ix:trophy" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=league]:text-brand text-gray-500">
                            </iconify-icon>
                            <span
                                class="text-sm flex-1 ms-3 whitespace-nowrap hidden group-data-[active=league]:text-brand text-gray-500 group-hover:block">Leagues</span>
                        </a>
                    </li>
                    <li>
                        <a href="./news.html"
                            class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                            <iconify-icon icon="streamline-plump:news-paper" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=news]:text-white group-data-[active=news]:dark:text-black text-gray-500 ">
                            </iconify-icon>
                            <span
                                class="text-sm flex-1 ms-3 whitespace-nowrap hidden group-data-[active=news]:text-black group-data-[active=news]:dark:text-white text-gray-500 group-hover:block">News</span>
                        </a>
                    </li>
                    <li>
                        <a href="./profile.html"
                            class="flex items-center p-2 text-gray-900 rounded-lg dark:text-white hover:bg-gray-100 dark:hover:bg-gray-700 group">
                            <iconify-icon icon="healthicons:ui-user-profile" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=profile]:text-white group-data-[active=profile]:dark:text-black text-gray-500">
                            </iconify-icon>
                            <span
                                class="text-sm flex-1 ms-3 whitespace-nowrap hidden group-data-[active=profile]:text-black group-data-[active=profile]:dark:text-white text-gray-500 group-hover:block">Profile</span>
                        </a>
                    </li>
                </ul>
            </div>

            <mode-toggle-button>
                <button
                    class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md border border-gray-200"
                    mode-toggle>
                    <iconify-icon icon="meteocons:starry-night-fill" width="100%" height="100%"
                        class="w-8 h-8 group-data-[theme=dark]/body:hidden group-data-[theme=light]/body:block"></iconify-icon>

                    <iconify-icon icon="meteocons:clear-day-fill" width="100%" height="100%"
                        class="w-8 h-8 group-data-[theme=dark]/body:block group-data-[theme=light]/body:hidden"></iconify-icon>
                </button>
            </mode-toggle-button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 h-screen bg-gray-100 dark:bg-gray-800">

        <div class="@container max-w-5xl mx-auto">

            <!-- Nav -->
            <section class="mb-6 fadeUp flex justify-between">
                <div class="relative flex items-center">
                    <span>Leagues</span>
                </div>
                <mode-toggle-button>
                    <button
                        class="p-1 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md border border-gray-200"
                        mode-toggle>
                        <iconify-icon icon="meteocons:starry-night-fill" width="100%" height="100%"
                            class="w-8 h-8 group-data-[theme=dark]/body:hidden group-data-[theme=light]/body:block"></iconify-icon>

                        <iconify-icon icon="meteocons:clear-day-fill" width="100%" height="100%"
                            class="w-8 h-8 group-data-[theme=dark]/body:block group-data-[theme=light]/body:hidden"></iconify-icon>
                    </button>
                </mode-toggle-button>
            </section>

            <!-- Search -->
            <section class="mb-10 fadeUp">
                <div class="relative flex items-center mt-4 md:mt-0">
                    <span class="absolute text-gray-700 dark:text-gray-300 mx-3">
                        <iconify-icon width="24" height="24" icon="jam:search"
                            class="w-5 h-5 text-gray-700 dark:text-gray-300">
                        </iconify-icon>
                    </span>

                    <input type="text" list="browsers" placeholder="Find Leagues"
                        class="text-sm block w-full py-2.5 pr-5 text-gray-500 bg-gray-200 border border-gray-900 dark:border-gray-100 rounded-xl placeholder-gray-500 pl-11 rtl:pr-11 rtl:pl-5 dark:bg-gray-800 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-orange-500/50 focus:border-orange-500 transition-all"
                        name="search">

                </div>
            </section>

            <!-- Leagues -->
            <section
                class="mb-10 fadeUp dark:glass-light rounded-md fadeUp">
                <div class="relative flex flex-col items-center gap-4 overflow-x-auto w-full">

                        <a class="flex p-4 items-center w-full bg-gray-900 rounded-md shadow-md shadow-gray-200 dark:shadow-gray-900 hover:bg-bg-3" href="./leagues/champions_league">
                            <img src="./assets/uefa-champions-league.svg" class="w-10 h-10 text-text-1">

                            </img>
                            <p class="px-4 text-md font-medium whitespace-nowrap">
                                Champions League
                            </p>
                        </a>

                        <a class="flex p-4 items-center w-full bg-gray-900 rounded-md shadow-md shadow-gray-200 dark:shadow-gray-900 hover:bg-bg-3" href="./leagues/football_spot">
                            <img src="./assets/mercedes-benz.svg" class="w-10 h-10">

                            </img>
                            <p class="px-4 text-md font-medium whitespace-nowrap">
                                Football Spot
                            </p>
                        </a>
                        <a class="flex p-4 items-center w-full bg-gray-900 rounded-md shadow-md shadow-gray-200 dark:shadow-gray-900 hover:bg-bg-3" href="./leagues/football_spot">
                            <img src="./assets/favicon.ico" class="w-10 h-10">

                            </img>
                            <p class="px-4 text-md font-medium whitespace-nowrap">
                                Fotclan League
                            </p>
                        </a>

                </div>

            </section>

            <div class="h-12 md:h-0 lg:h-0"></div>
        </div>


    </main>

    <!-- Bottom Navigation (Mobile) -->

    <nav class="md:hidden fixed bottom-0 inset-x-0 glass dark:glass-light backdrop-blur-md border-t border-gray-300 dark:border-gray-600 flex justify-around pb-3 text-gray-900 dark:text-gray-100 group"
        data-active="league">
        <a href="./matches.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-gray-200 hover:dark:bg-gray-800 rounded-md"
            data-active="true">
            <iconify-icon icon="boxicons:football-pitch" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=matches]:text-white group-data-[active=matches]:dark:text-black text-gray-500 "></iconify-icon>
            <span
                class="group-data-[active=matches]:text-black group-data-[active=matches]:dark:text-white text-gray-500 dark:text-gray-300">Matches</span>
        </a>
        <a href="./leagues.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-gray-200 hover:dark:bg-gray-800 rounded-md"
            data-active="false">
            <iconify-icon icon="ix:trophy" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=league]:text-brand text-gray-500">
                            </iconify-icon>
            <span
                class="group-data-[active=league]:text-black group-data-[active=league]:dark:text-brand text-gray-500">Leagues</span>
        </a>
        <a href="./news.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-gray-200 hover:dark:bg-gray-800 rounded-md"
            data-active="false">
             <iconify-icon icon="streamline-plump:news-paper" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=news]:text-white group-data-[active=news]:dark:text-black text-gray-500 ">
                            </iconify-icon>
            <span
                class="group-data-[active=news]:text-black group-data-[active=news]:dark:text-white text-gray-500">News</span>
        </a>
        <a href="./profile.html"
            class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-gray-200 hover:dark:bg-gray-800 rounded-md"
            data-active="false">
            <iconify-icon icon="healthicons:ui-user-profile" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=profile]:text-white group-data-[active=profile]:dark:text-black text-gray-500">
                            </iconify-icon>
            <span
                class="group-data-[active=profile]:text-black group-data-[active=profile]:dark:text-white text-gray-500">Profile</span>
        </a>
    </nav>

</body>
<script>
    /* ---------- ANIMATE CARDS ---------- */
    document.querySelectorAll('.fadeUp').forEach((el, i) => {
        setTimeout(() => el.style.opacity = 1, 300 + i * 80);
    });
</script>

</html>
