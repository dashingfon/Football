<script>
    /* ---------- ANIMATE CARDS ---------- */
    document.querySelectorAll('.fadeUp').forEach((el, i) => {
        setTimeout(() => el.style.opacity = 1, 300 + i * 80);
    });

    /* ---------- SCROLL NAV HIDE/SHOW ---------- */
    let lastTogglePos = 0;
    const nav = document.getElementById("mobile-nav");
    const mainElement = document.querySelector('main');
    const scrollThreshold = 20;

    if (mainElement && nav) {
        mainElement.addEventListener('scroll', () => {
            const currentScrollPos = mainElement.scrollTop;
            const scrollDelta = Math.abs(currentScrollPos - lastTogglePos);

            if (scrollDelta >= scrollThreshold) {
                if (currentScrollPos > lastTogglePos) {
                    // Scrolling down - hide nav
                    nav.setAttribute('data-hidden', 'true');
                } else {
                    // Scrolling up - show nav
                    nav.setAttribute('data-hidden', 'false');
                }
                lastTogglePos = currentScrollPos;
            }
        });
    }
</script>
