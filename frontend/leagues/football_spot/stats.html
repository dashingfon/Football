<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <style>
        @keyframes fade-up {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fadeUp {
            opacity: 0;
            animation: fade-up 0.8s forwards;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #e5e7eb;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #3b82f6;
            border-radius: 9999px;
        }
    </style>

    <title>Football Spot</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="../../assets/output.css" />
    <link rel="shortcut icon" href="../../assets/favicon.ico" type="image/x-icon" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Serif:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter&display=swap"
        rel="stylesheet" />

    <script src="../../assets/js/components.js" type="module" defer></script>
    <script src="../../assets/js/iconify.min.js"></script>
</head>

<init-stats>
</init-stats>
<body data-theme="light"
    class="font-[Inter] antialiased transition-colors duration-500 bg-bg-2 dark:text-text-1 flex h-screen whitespace-nowrap group/body">
    <!-- <desktop-sidebar>
    </desktop-sidebar> -->
    <aside class="hidden md:block z-40 h-screen relative border-r border-bg-3" aria-label="Sidebar">
        <div class="h-full px-3 py-4 overflow-y-auto no-scrollbar bg-bg-1 flex flex-col justify-between transition-all duration-50 group hover:w-70 data-[expanded=false]:w-16"
            data-active="league">
            <div>
                <ul class="space-y-2 font-medium pb-3">
                    <li>
                        <a href="../../index.html" class="relative flex items-center p-2 text-text-1 rounded-lg">
                            <img src="../../assets/favicon.ico" class="w-6 h-6" />
                            <span class="text-md ms-3 hidden group-hover:block">Fotclan</span>
                        </a>
                    </li>
                </ul>
                <ul class="space-y-2 font-medium border-t border-bg-3 pt-3">
                    <li>
                        <a href="./matches.html"
                            class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="boxicons:football-pitch" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=matches]:text-brand"></iconify-icon>

                            <span
                                class="text-sm ms-3 hidden group-data-[active=matches]:text-brand group-hover:block">Matches</span>
                        </a>
                    </li>
                    <li>
                        <a href="./leagues.html"
                            class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="ix:trophy" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=league]:text-brand text-text-6">
                            </iconify-icon>
                            <span
                                class="text-sm ms-3 hidden group-data-[active=league]:text-brand group-hover:block">Leagues</span>
                        </a>
                    </li>
                    <li>
                        <a href="./news.html" class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="streamline-plump:news-paper" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=news]:text-brand text-text-6">
                            </iconify-icon>
                            <span
                                class="text-sm ms-3 hidden group-data-[active=news]:text-brand group-hover:block">News</span>
                        </a>
                    </li>
                    <li>
                        <a href="./profile.html"
                            class="flex items-center p-2 text-text-6 rounded-lg hover:bg-bg-3 z-200">
                            <iconify-icon icon="healthicons:ui-user-profile" width="100%" height="100%"
                                class="w-6 h-6 group-data-[active=profile]:text-brand text-text-6">
                            </iconify-icon>
                            <span
                                class="text-sm ms-3 hidden group-data-[active=profile]:text-brand group-hover:block">Profile</span>
                        </a>
                    </li>
                </ul>
            </div>

            <mode-toggle-button>
                <button class="p-1 hover:bg-bg-3 text-text-2 rounded-md border border-bg-3" mode-toggle>
                    <iconify-icon icon="meteocons:starry-night-fill" width="100%" height="100%"

                    <iconify-icon icon="meteocons:clear-day-fill" width="100%" height="100%"

                </button>
            </mode-toggle-button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 h-screen bg-bg-2">

        <!-- use grid to maitain spacing -->
        <div class="max-w-5xl mx-auto grid grid-rows-[auto_auto_auto_1fr] h-full">
            <!-- Nav -->
            <section class="mb-4 flex justify-between">
                <nav class="flex items-center gap-8">
                    <a class="flex items-center gap-3" href="../football_spot/">
                        <iconify-icon icon="ep:back" width="100%" height="100%"
                            class="w-6 h-6 group-data-[theme=dark]:hidden group-data-[theme=light]:block"></iconify-icon>
                        <span class="text-sm">Football Spot</span>
                    </a>
                </nav>
                <mode-toggle-button>
                    <button class="p-1 hover:bg-bg-3 text-text-2 rounded-md border border-bg-3" mode-toggle>
                        <iconify-icon icon="meteocons:starry-night-fill" width="100%" height="100%"
                            class="w-8 h-8 group-data-[theme=dark]/body:hidden group-data-[theme=light]/body:block"></iconify-icon>

                        <iconify-icon icon="meteocons:clear-day-fill" width="100%" height="100%"
                            class="w-8 h-8 group-data-[theme=dark]/body:block group-data-[theme=light]/body:hidden"></iconify-icon>
                    </button>
                </mode-toggle-button>
            </section>

            <!-- Season select -->
            <section class="overflow-auto flex-none mb-2 w-full h-full bg-bg-2 no-scrollbar">
                <drop-down>
                    <style>
                        #season-dropdown-button {
                            anchor-name: --season-anchor;
                        }

                        #season-dropdown {
                            position-anchor: --season-anchor;
                            margin: 0;
                            inset: auto;
                            top: anchor(bottom);
                            right: anchor(right);
                        }
                    </style>
                    <!-- Season -->

                        class="bg-bg-3 border border-bg-1 flex flex-col rounded-md h-fit w-full"
                        popovertarget="season-dropdown">
                        <div class="flex justify-between p-2 h-fit">
                            <span class="pt-2 pl-2" id="season-name">February 2026</span>
                            <div class="m-2 p-2 bg-3 text-text-2 rounded-md border border-bg-1 leading-none">

                            </div>
                        </div>
                    </button>

                    <!-- Season Dropdown menu -->
                    <div id="season-dropdown" popover
                        class="not-even:absolute max-h-96 bg-bg-3 border border-bg-1 rounded-md shadow-lg w-44">
                        <template id="seasons-template">
                            <li>
                                <button data-season="february_2026"
                                    class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded season btn">February
                                    2026</button>
                            </li>
                        </template>
                        <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownDefaultButton"
                            id="seasons-list">
                            <div class="w-full h-full flex items-center justify-center">

                                <svg aria-hidden="true" class="w-8 h-8 animate-spin fill-brand" viewBox="0 0 100 101"

                                        d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                                        fill="currentColor" />
                                    <path
                                        d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                                        fill="currentFill" />
                                </svg>

                            </div>
                        </ul>
                    </div>
                </drop-down>
            </section>

            <!-- Stats select -->
            <section class="overflow-auto flex-none mb-4 w-full h-full bg-bg-2 no-scrollbar">
                <drop-down>
                    <style>
                        #stats-dropdown-button {
                            anchor-name: --stats-anchor;
                        }

                        #stats-dropdown {
                            position-anchor: --stats-anchor;
                            margin: 0;
                            inset: auto;
                            top: anchor(bottom);
                            right: anchor(right);
                        }
                    </style>
                    <!-- Stats -->
                    <button id="stats-dropdown-button"
                        class="bg-bg-3 border border-bg-1 flex flex-col rounded-md h-fit w-full"
                        popovertarget="stats-dropdown">
                        <div class="flex justify-between p-2 h-fit">
                            <span class="pt-2 pl-2" id="stats-name">Goals</span>
                            <div class="m-2 p-2 hover:bg-bg-3 text-text-2 rounded-md border border-bg-1 leading-none">
                                <iconify-icon icon="icon-park-solid:down-one" width="100%" height="100%"
                                    class="w-4 h-4 group-data-[theme=dark]:hidden group-data-[theme=light]:block"></iconify-icon>
                            </div>
                        </div>
                    </button>

                    <!-- Stats Dropdown menu -->
                    <div id="stats-dropdown" popover
                        class="not-even:absolute max-h-96 bg-bg-3 border border-bg-1 border-default-medium rounded-md shadow-lg w-44">
                        <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownDefaultButton">
                            <li>
                                <button data-stats="g/a"
                                    class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">Goals
                                    + Assists</button>
                            </li>
                            <li>
                                <button data-stats="goals"
                                    class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">Goals</button>
                            </li>
                            <li>
                                <button data-stats="assists"
                                    class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">Assists</button>
                            </li>
                            <li>
                                <button data-stats="cleansheets"
                                    class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">Cleansheets</button>
                            </li>
                        </ul>
                    </div>
                </drop-down>
            </section>


            <nav-controller data-nav="mobile-nav" data-loading="true"
                class="overflow-auto flex-none w-full h-full bg-bg-2 snap-start snap-always group">
                <!-- Stats -->
                <chart-race data-target="init-stats" data-playing="false" class="group">
                    <section>

                        <div class="w-full h-full hidden items-center justify-center group-data-[loading=true]:flex">

                            <svg aria-hidden="true" class="w-8 h-8 animate-spin fill-brand" viewBox="0 0 100 101"
                                fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                                    fill="currentColor" />
                                <path
                                    d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                                    fill="currentFill" />
                            </svg>

                        </div>
                        <!-- controls -->
                        <div class="group-data-[loading=true]:hidden flex mt-2">
                            <button id="play-controls"
                                class="m-2 p-2 hover:bg-bg-3 text-text-5 rounded-md border border-text-6 leading-none">
                                <iconify-icon icon="mingcute:play-fill" width="100%" height="100%"
                                    class="w-4 h-4 group-data-[playing=false]:block group-data-[playing=true]:hidden"></iconify-icon>
                                <iconify-icon icon="mingcute:pause-fill" width="100%" height="100%"
                                    class="w-4 h-4 group-data-[playing=false]:hidden group-data-[playing=true]:block"></iconify-icon>
                            </button>
                            <style>
                                #round-dropdown-button {
                                    anchor-name: --round-anchor;
                                }

                                #round-dropdown {
                                    position-anchor: --round-anchor;
                                    margin: 0;
                                    inset: auto;
                                    top: anchor(bottom);
                                    right: anchor(right);
                                }
                            </style>
                            <button id="round-dropdown-button" popovertarget="round-dropdown"
                                class="m-2 p-2 hover:bg-bg-3 text-text-1 font-bold rounded-md border border-text-6 leading-none items-center">
                                <span class="px-2 id">1</span>
                                <iconify-icon icon="icon-park-solid:down-one" width="100%" height="100%"
                                    class="w-4 h-4 group-data-[theme=dark]:hidden group-data-[theme=light]:block"></iconify-icon>
                            </button>
                            <!-- Dropdown menu -->
                            <div id="round-dropdown" popover
                                class="absolute not-even:absolute max-h-96 bg-bg-2 border border-text-6 text-text-5 border-default-medium rounded-md shadow-lg w-15">
                                <template id="round-template">
                                    <li>
                                        <button
                                            class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded round">1</button>
                                    </li>
                                </template>

                                <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownDefaultButton"
                                    id="rounds-list">
                                    <li>
                                        <button
                                            class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">1</button>
                                    </li>
                                    <li>
                                        <button
                                            class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">2</button>
                                    </li>
                                    <li>
                                        <button
                                            class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">3</button>
                                    </li>
                                    <li>
                                        <button
                                            class="inline-flex items-center w-full p-2 hover:bg-bg-1 hover:text-heading rounded">4</button>
                                    </li>
                                </ul>
                            </div>
                            <button id="previous-button"
                                class="m-2 p-2 hover:bg-bg-3 text-text-5 rounded-md border border-text-6 leading-none">
                                <iconify-icon icon="fluent:previous-24-filled" width="100%" height="100%"
                                    class="w-4 h-4 group-data-[theme=dark]:hidden group-data-[theme=light]:block"></iconify-icon>
                            </button>
                            <button id="next-button"
                                class="m-2 p-2 hover:bg-bg-3 text-text-5 rounded-md border border-text-6 leading-none">
                                <iconify-icon icon="fluent:next-24-filled" width="100%" height="100%"
                                    class="w-4 h-4 group-data-[theme=dark]:hidden group-data-[theme=light]:block"></iconify-icon>
                            </button>
                        </div>

                        <!-- heading -->
                        <div
                            class="group-data-[loading=true]:hidden gap-1 my-2 p-2 bg-bg-1 rounded-md text-sm grid grid-cols-10 font-medium">
                            <span class="col-span-1">#</span>
                            <span class="col-span-6 overflow-hidden">Player</span>
                            <span class="col-span-3" id="specific-stats">Goals</span>
                        </div>

                        <template id="table-entry-template">
                            <div class="entries group" data-direction="">
                                <div class="bg-bg-2 p-2 rounded-t-md grid grid-cols-10 transition-all">
                                    <div class="flex">
                                        <span class="col-span-1 index">1</span>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24">
                                            <path d="m12 8l7 8H5z"
                                                class="fill-green-500 w-4 h-4 group-data-[direction=up]:block hidden" />
                                        </svg>

                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24">
                                            <path d="m5 8l7 8l7-8z"
                                                class="fill-red-500 w-4 h-4 group-data-[direction=down]:block hidden" />
                                        </svg>

                                    </div>
                                    <span class="col-span-7 overflow-hidden name">Mfon</span>
                                    <span class="col-span-2 value">99</span>
                                </div>

                                <div class="bg-bg-1 h-2 mb-4 rounded-b-md">
                                    <div class="h-full bg-brand rounded-r-full width transition-all duration-[2s]" style="width: 80%"></div>
                                </div>
                            </div>
                        </template>

                        <!-- table -->
                        <div class="group-data-[loading=true]:hidden flex flex-col" id="table-container">


                        </div>
                    </section>
                </chart-race>
            </nav-controller>

        </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->

    <nav id="mobile-nav" data-hidden="false"
        class="md:hidden fixed bottom-0 inset-x-0 glass dark:glass-light backdrop-blur-md border-t border-bg-2 bg-bg-2 flex justify-around pb-3 text-text-2 group data-[hidden=true]:translate-y-full transition-transform duration-300 z-100"
        data-active="league">
        <a href="./matches.html" class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="true">
            <iconify-icon icon="boxicons:football-pitch" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=matches]:text-brand text-text-6"></iconify-icon>
            <span class="group-data-[active=matches]:text-brand text-text-6">Matches</span>
        </a>
        <a href="./leagues.html" class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="false">
            <iconify-icon icon="ix:trophy" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=league]:text-brand text-text-6">
            </iconify-icon>
            <span class="group-data-[active=league]:text-brand text-text-6">Leagues</span>
        </a>
        <a href="./news.html" class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="false">
            <iconify-icon icon="streamline-plump:news-paper" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=news]:text-brand text-text-6">
            </iconify-icon>
            <span class="group-data-[active=news]:text-brand text-text-6">News</span>
        </a>
        <a href="./profile.html" class="flex flex-col items-center text-xs group py-2 px-5 hover:bg-bg-1 rounded-md"
            data-active="false">
            <iconify-icon icon="healthicons:ui-user-profile" width="100%" height="100%"
                class="w-6 h-6 group-data-[active=profile]:text-brand text-text-6">
            </iconify-icon>
            <span class="group-data-[active=profile]:text-brand text-text-6">Profile</span>
        </a>
    </nav>
</body>
<script>
    /* ---------- ANIMATE CARDS ---------- */
    document.querySelectorAll(".fadeUp").forEach((el, i) => {
        setTimeout(() => (el.style.opacity = 1), 300 + i * 80);
    });
</script>

</html>
